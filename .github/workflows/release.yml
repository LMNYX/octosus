name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: octosus-linux-amd64
          - os: ubuntu-24.04-arm
            artifact: octosus-linux-arm64
          - os: macos-latest
            artifact: octosus-macos-amd64
          - os: macos-14
            artifact: octosus-macos-arm64
          - os: windows-latest
            artifact: octosus-windows-amd64.exe
          - os: windows-latest
            artifact: octosus-windows-arm64.exe
            cross_arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests rich pyinstaller

      - name: Build binary
        run: pyinstaller --onefile --name ${{ matrix.artifact }} --clean --noconfirm ${{ matrix.cross_arch && format('--target-arch {0}', matrix.cross_arch) || '' }} octosus.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate tag
        id: tag
        run: echo "tag=v1.0.0-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Octosus ${{ steps.tag.outputs.tag }}
          body: |
            Automated build from commit ${{ github.sha }}.

            ## Downloads
            | Platform | Binary |
            |----------|--------|
            | Linux x64 | `octosus-linux-amd64` |
            | Linux ARM64 | `octosus-linux-arm64` |
            | macOS x64 | `octosus-macos-amd64` |
            | macOS ARM64 | `octosus-macos-arm64` |
            | Windows x64 | `octosus-windows-amd64.exe` |
            | Windows ARM64 | `octosus-windows-arm64.exe` |
          files: artifacts/*
          generate_release_notes: true
